# Nginx reverse proxy config for NSE EOD Data Manager
# Place this file at: /etc/nginx/sites-available/nse-eod
# Then: sudo ln -s /etc/nginx/sites-available/nse-eod /etc/nginx/sites-enabled/

server {
    listen 80;
    # Replace with your actual domain or Oracle public IP
    server_name your-domain.com www.your-domain.com;

    # Redirect all HTTP → HTTPS (uncomment after setting up SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket support — required for NiceGUI's real-time UI
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — NiceGUI keeps long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;

        # Buffer settings
        proxy_buffering off;
        proxy_cache off;
    }
}

